<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOD006125 — Practical Mock Exam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafafa;--card:#fff;--text:#111;--muted:#666;--border:#e0e0e0;--accent:#0070f3;--ok:#059669;--er:#dc2626;--cbg:#f5f5f5;--sh:0 1px 3px rgba(0,0,0,.08)}
[data-theme="dark"]{--bg:#0a0a0a;--card:#141414;--text:#eaeaea;--muted:#888;--border:#2a2a2a;--accent:#3b82f6;--ok:#34d399;--er:#f87171;--cbg:#1a1a1a;--sh:0 1px 3px rgba(0,0,0,.4)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1.25rem 5rem}
.top{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.top h1{font-size:1rem;font-weight:600}
.top-r{display:flex;gap:.5rem;align-items:center}
.btn-s{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.35rem .7rem;border-radius:6px;font-size:.8rem;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-s:hover{border-color:var(--accent);color:var(--accent)}
.stabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
.stab{padding:.45rem .9rem;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--text);transition:all .15s}
.stab:hover{border-color:var(--accent)}
.stab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sdesc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--sh)}
.sdesc h2{font-size:1.05rem;margin-bottom:.3rem}
.sdesc p{font-size:.85rem;color:var(--muted)}
pre{background:var(--cbg);border:1px solid var(--border);border-radius:8px;padding:.85rem;font-size:.82rem;overflow-x:auto;margin:.6rem 0;font-family:'SF Mono',Consolas,monospace;line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:.82rem;margin:.6rem 0}
th,td{padding:.45rem .6rem;border:1px solid var(--border);text-align:left}
th{background:var(--cbg);font-weight:600}
.q{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:.85rem;box-shadow:var(--sh)}
.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.qn{font-size:.72rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em}
.qt{font-size:.68rem;padding:.15rem .45rem;border-radius:4px;background:var(--cbg);color:var(--muted);border:1px solid var(--border)}
.qtxt{font-size:.92rem;font-weight:500;margin-bottom:.85rem;line-height:1.55}
.opts{display:flex;flex-direction:column;gap:.35rem}
.opt{display:flex;align-items:flex-start;gap:.55rem;padding:.55rem .75rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .12s;font-size:.85rem;user-select:none}
.opt:hover{border-color:var(--accent);background:var(--cbg)}
.opt input{margin-top:.2rem;accent-color:var(--accent);pointer-events:none}
.opt.pk{border-color:var(--accent);background:rgba(0,112,243,.04)}
[data-theme="dark"] .opt.pk{background:rgba(59,130,246,.08)}
.opt.ok{border-color:var(--ok);background:rgba(5,150,105,.06);color:var(--ok)}
.opt.no{border-color:var(--er);background:rgba(220,38,38,.06);color:var(--er)}
.opt .ck{margin-left:auto;font-size:.85rem;font-weight:700;min-width:1rem;text-align:center}
.oi{background:var(--cbg);border:1px solid var(--border);border-radius:6px;padding:.35rem .55rem;font-family:'SF Mono',Consolas,monospace;font-size:.85rem;color:var(--text);width:180px;max-width:100%;outline:none}
.oi:focus{border-color:var(--accent)}
.mc{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;font-size:.82rem}
.mi{padding:.45rem .55rem;border:1px solid var(--border);border-radius:6px;background:var(--cbg)}
.ms{width:100%;padding:.35rem;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:.82rem;margin-top:.25rem}
.olist{display:flex;flex-direction:column;gap:.35rem}
.oi2{display:flex;align-items:center;gap:.55rem;padding:.45rem .65rem;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:.85rem;cursor:grab}
.oi2 .nm{width:20px;height:20px;border-radius:50%;background:var(--cbg);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--muted);flex-shrink:0}
.oi2.dg{opacity:.5}
.oi2.dv{border-color:var(--accent);border-style:dashed}
.exp{margin-top:.65rem;padding:.65rem;background:var(--cbg);border-radius:6px;font-size:.82rem;color:var(--muted);border-left:3px solid var(--accent);display:none}
.exp.show{display:block}
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:.65rem;display:flex;justify-content:center;gap:1rem;align-items:center;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.05)}
.btn{padding:.55rem 1.4rem;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn1{background:var(--accent);color:#fff}.btn1:hover{opacity:.9}
.btn2{background:var(--cbg);color:var(--text);border:1px solid var(--border)}.btn2:hover{border-color:var(--accent)}
.scr{font-size:.88rem;font-weight:600}
.sg{color:var(--ok)}.sb{color:var(--er)}
@media(max-width:600px){.wrap{padding:1rem 1rem 5rem}.mc{grid-template-columns:1fr}}
</style>
</head>

</div>

{tp:'sng',tx:'Which service logs API calls for auditing "who did what, when, and where"?',op:['AWS Config','AWS CloudTrail','Amazon CloudWatch','AWS Trusted Advisor'],c:1,ex:'CloudTrail = API audit logging.'},

{tp:'sng',tx:'Which service uses YAML/JSON templates?',op:['CodeDeploy','CloudFormation','CodePipeline','EC2'],c:1,ex:'CloudFormation = declarative IaC via templates.'},

{tp:'sng',tx:'Operational Excellence recommends viewing workload as:',op:['Fixed servers','Code — automatable and versioned','Manual runbook','Cost center'],c:1,ex:'View entire workload as code.'},
{tp:'sng',tx:'Purpose of a CloudFormation stack:',op:['Group of resources managed as single unit','Collection of IAM users','Set of S3 buckets','Network of EC2s'],c:0,ex:'Stack = related resources managed together.'},
{tp:'fb',tx:'The pillar focused on running systems and improving processes is <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> Excellence.',c:['Operational'],ex:'Operational Excellence = run, monitor, improve.'},

{tp:'mul',tx:'Which are valid EC2 pricing models? (Select ALL)',op:['On-Demand','Spot','Reserved','Subscription'],c:[0,1,2],ex:'On-Demand, Reserved, Spot, Savings Plans. No "Subscription" model.'},

{tp:'fb',tx:'The AWS CLI command to list S3 buckets is: aws <u>&nbsp;&nbsp;&nbsp;</u> <u>&nbsp;&nbsp;&nbsp;</u>',c:['s3','ls'],ex:'aws s3 ls lists all S3 buckets.'}

let ci=0,ans={};

function init(){
const n=document.getElementById('sn');
S.forEach((s,i)=>{const b=document.createElement('button');b.className='stab'+(i===0?' on':'');b.textContent=s.t;b.onclick=()=>sw(i);n.appendChild(b)});
ld(0);
if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('tb').textContent='☀️'}
}

function sw(i){ci=i;document.querySelectorAll('.stab').forEach((b,j)=>b.classList.toggle('on',j===i));ld(i)}

function ld(idx){
ans={};document.getElementById('sd').textContent='';
const s=S[idx];let h=`<div class="sdesc"><h2>${s.d}</h2><p>${s.l}</p></div>`;
s.q.forEach((q,i)=>{h+=rq(q,i)});
document.getElementById('sc').innerHTML=h;
idr();
}

function rq(q,i){
let h=`<div class="q" id="q${i}"><div class="qh"><span class="qn">Q${i+1}</span><span class="qt">${tl(q.tp)}</span></div><div class="qtxt">${q.tx}</div>`;
if(q.tp==='sng'||q.tp==='tf'){
h+='<div class="opts">';
q.op.forEach((o,j)=>{h+=`<label class="opt" data-qi="${i}" data-oi="${j}" onclick="ps(${i},${j},this)"><input type="radio" name="q${i}"><span>${o}</span><span class="ck"></span></label>`});
h+='</div>';
}else if(q.tp==='mul'){
h+='<div class="opts">';
q.op.forEach((o,j)=>{h+=`<label class="opt" data-qi="${i}" data-oi="${j}" onclick="pm(${i},${j},this)"><input type="checkbox"><span>${o}</span><span class="ck"></span></label>`});
h+='</div>';
}else if(q.tp==='fb'){
h+=`<div style="margin-top:.5rem"><input class="oi" id="fb${i}" placeholder="type answer..."></div>`;
}else if(q.tp==='fb2'){
let blanks='';q.c.forEach((_,j)=>{blanks+=`<input class="oi" id="fb${i}_${j}" placeholder="blank ${j+1}..." style="width:150px;margin-right:.5rem">`});
h+=`<div style="margin-top:.5rem">${blanks}</div>`;
}else if(q.tp==='ord'){
const sh=[...Array(q.it.length).keys()].sort(()=>Math.random()-.5);
h+=`<div class="olist" id="ol${i}">`;
sh.forEach((orig,j)=>{h+=`<div class="oi2" draggable="true" data-o="${orig}" data-p="${i}"><span class="nm">${j+1}</span><span>${q.it[orig]}</span></div>`});
h+='</div>';
}else if(q.tp==='mat'){
h+=`<div class="mc">`;
q.lf.forEach((l,j)=>{h+=`<div class="mi"><strong>${String.fromCharCode(65+j)}.</strong> ${l}<select class="ms" id="mt${i}_${j}"><option value="">— select —</option>${q.rt.map((r,k)=>`<option value="${k}">${r}</option>`).join('')}</select></div>`});
h+='</div>';
}
h+=`<div class="exp" id="ex${i}">${q.ex}</div></div>`;
return h;
}

function tl(t){return{sng:'Multiple Choice',mul:'Multiple Answer',tf:'True / False',fb:'Fill in Blank',fb2:'Fill in Blanks',ord:'Ordering',mat:'Matching'}[t]}

function ps(qi,oi,el){
document.querySelectorAll(`[data-qi="${qi}"]`).forEach(o=>{o.classList.remove('pk');o.querySelector('input').checked=false});
el.classList.add('pk');el.querySelector('input').checked=true;ans[qi]={s:oi};
}

function pm(qi,oi,el){
if(!ans[qi])ans[qi]={s:[]};
const inp=el.querySelector('input');inp.checked=!inp.checked;el.classList.toggle('pk',inp.checked);
if(inp.checked){ans[qi].s.push(oi)}else{ans[qi].s=ans[qi].s.filter(x=>x!==oi)}
}

function idr(){
document.querySelectorAll('.olist').forEach(c=>{
c.addEventListener('dragstart',e=>{const d=e.target.closest('.oi2');if(d){d.classList.add('dg');e.dataTransfer.setData('text/plain',d.dataset.o)}});
c.addEventListener('dragend',e=>{const d=e.target.closest('.oi2');if(d)d.classList.remove('dg');c.querySelectorAll('.oi2').forEach(x=>x.classList.remove('dv'))});
c.addEventListener('dragover',e=>{e.preventDefault();const d=e.target.closest('.oi2');if(d)d.classList.add('dv')});
c.addEventListener('dragleave',e=>{const d=e.target.closest('.oi2');if(d)d.classList.remove('dv')});
c.addEventListener('drop',e=>{
e.preventDefault();
const tgt=e.target.closest('.oi2');if(!tgt)return;
const dragged=c.querySelector(`.oi2[data-o="${e.dataTransfer.getData('text/plain')}"]`);
if(!dragged||dragged===tgt)return;
const items=[...c.children];const di=items.indexOf(dragged);const ti=items.indexOf(tgt);
if(di<ti)c.insertBefore(dragged,tgt.nextSibling);else c.insertBefore(dragged,tgt);
rn(c);c.querySelectorAll('.oi2').forEach(x=>x.classList.remove('dv'));
});
});
}

function rn(c){c.querySelectorAll('.oi2').forEach((x,i)=>x.querySelector('.nm').textContent=i+1)}

function chk(){
const s=S[ci];let correct=0,total=s.q.length;
s.q.forEach((q,i)=>{
const ex=document.getElementById(`ex${i}`);ex.classList.add('show');
if(q.tp==='sng'||q.tp==='tf'){
const opts=document.querySelectorAll(`[data-qi="${i}"]`);
const sel=ans[i]?.s;
opts.forEach((o,j)=>{
o.classList.remove('pk','ok','no');
const ck=o.querySelector('.ck');
if(j===q.c){o.classList.add('ok');ck.textContent='✓'}
else if(j===sel){o.classList.add('no');ck.textContent='✗'}
else{ck.textContent=''}
});
if(sel===q.c)correct++;
}else if(q.tp==='mul'){
const opts=document.querySelectorAll(`[data-qi="${i}"]`);
const sel=ans[i]?.s||[];
const ss=[...sel].sort(),sc=[...q.c].sort();
opts.forEach((o,j)=>{
o.classList.remove('pk','ok','no');
const ck=o.querySelector('.ck');
if(q.c.includes(j)){o.classList.add('ok');ck.textContent='✓'}
else if(sel.includes(j)){o.classList.add('no');ck.textContent='✗'}
else{ck.textContent=''}
});
if(JSON.stringify(ss)===JSON.stringify(sc))correct++;
}else if(q.tp==='fb'){
const inp=document.getElementById(`fb${i}`);
const val=inp.value.trim().toLowerCase();
const cor=q.c[0].toLowerCase();
inp.style.borderColor=val===cor?'var(--ok)':'var(--er)';
if(val===cor)correct++;
}else if(q.tp==='fb2'){
let all=true;
q.c.forEach((cor,j)=>{
const inp=document.getElementById(`fb${i}_${j}`);
const val=inp.value.trim().toLowerCase();
inp.style.borderColor=val===cor.toLowerCase()?'var(--ok)':'var(--er)';
if(val!==cor.toLowerCase())all=false;
});
if(all)correct++;
}else if(q.tp==='ord'){
const c=document.getElementById(`ol${i}`);
const items=[...c.querySelectorAll('.oi2')];
const order=items.map(x=>parseInt(x.dataset.o));
const ok=order.every((v,j)=>v===q.c[j]);
items.forEach((x,j)=>{
const orig=parseInt(x.dataset.o);
x.style.borderColor=orig===q.c[j]?'var(--ok)':'var(--er)';
});
if(ok)correct++;
}else if(q.tp==='mat'){
let all=true;
q.lf.forEach((_,j)=>{
const sel=document.getElementById(`mt${i}_${j}`);
const val=sel.value;
const isOk=val!==''&&parseInt(val)===q.c[j];
sel.style.borderColor=isOk?'var(--ok)':(val!==''?'var(--er)':'var(--border)');
if(!isOk)all=false;
});
if(all)correct++;
}
});
const pct=Math.round(correct/total*100);
const sd=document.getElementById('sd');
sd.textContent=`${correct}/${total} (${pct}%)`;
sd.className='scr '+(pct>=70?'sg':'sb');
}

function rst(){ld(ci)}

function tog(){
const d=document.documentElement;const b=document.getElementById('tb');
if(d.getAttribute('data-theme')==='dark'){d.removeAttribute('data-theme');b.textContent='🌙';localStorage.setItem('theme','light')}
else{d.setAttribute('data-theme','dark');b.textContent='☀️';localStorage.setItem('theme','dark')}
}

init();
</script>
