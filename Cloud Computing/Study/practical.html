<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOD006125 — Practical Mock Exam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--sf:#fff;--sf2:#f4f4f5;--sf3:#e4e4e7;
  --bd:rgba(0,0,0,.06);--bdh:rgba(0,0,0,.1);
  --t:#18181b;--t2:#52525b;--t3:#71717a;--t4:#a1a1aa;
  --ok:#059669;--okb:rgba(5,150,105,.06);--okbd:rgba(5,150,105,.2);
  --er:#dc2626;--erb:rgba(220,38,38,.06);--erbd:rgba(220,38,38,.15);
  --fr:rgba(5,150,105,.5);
  --font-sans:'Outfit',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --r:8px;--sp:8px;
}
[data-theme="dark"]{
  --bg:#08090a;--sf:#0f1011;--sf2:#161718;--sf3:#1c1d1f;
  --bd:rgba(255,255,255,.06);--bdh:rgba(255,255,255,.1);
  --t:#e4e4e7;--t2:#a1a1aa;--t3:#71717a;--t4:#52525b;
  --ok:#10b981;--okb:rgba(16,185,129,.08);--okbd:rgba(16,185,129,.2);
  --er:#ef4444;--erb:rgba(239,68,68,.08);--erbd:rgba(239,68,68,.2);
  --fr:rgba(16,185,129,.5);
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);background:var(--bg);color:var(--t);
  line-height:1.6;font-size:15px;font-weight:400;letter-spacing:.01em;
  -webkit-font-smoothing:antialiased;
  padding:calc(var(--sp)*3) calc(var(--sp)*2) calc(var(--sp)*10);
  transition:background .3s,color .3s;
}
@media(prefers-reduced-motion:reduce){*{transition-duration:0s!important}}

.shell{max-width:720px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:calc(var(--sp)*2);margin-bottom:calc(var(--sp)*2)}
.hdr-left{flex:1}
.hdr h1{font-size:1.4rem;font-weight:600;letter-spacing:-.02em;line-height:1.2;color:var(--t)}
.hdr .sub{font-size:.78rem;color:var(--t3);margin-top:4px}
.tbtn{width:36px;height:36px;border-radius:50%;background:var(--sf);border:1px solid var(--bd);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;transition:border-color .2s,color .2s,transform .15s;text-decoration:none}
.tbtn:hover{border-color:var(--bdh);color:var(--t)}.tbtn:active{transform:scale(.95)}

/* Scenario tabs */
.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:calc(var(--sp)*2)}
.stab{font-family:var(--font-sans);font-size:.75rem;font-weight:500;padding:6px 14px;border-radius:calc(var(--sp)*.5);background:transparent;border:1px solid var(--bd);color:var(--t3);cursor:pointer;transition:all .15s}
.stab:hover{border-color:var(--bdh);color:var(--t2)}
.stab.on{background:var(--ok);color:#fff;border-color:var(--ok)}

/* Scenario desc */
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:calc(var(--sp)*2);margin-bottom:calc(var(--sp)*2)}
.sc h2{font-size:.92rem;font-weight:600;letter-spacing:-.01em;margin-bottom:4px}
.sc .co{font-size:.78rem;color:var(--t3);margin-bottom:12px;line-height:1.5}
.sc pre{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;font-family:var(--font-mono);font-size:.74rem;overflow-x:auto;line-height:1.5;color:var(--t2);margin:8px 0}

/* Code / pre */
pre{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:calc(var(--sp)*1.25);font-family:var(--font-mono);font-size:.78rem;overflow-x:auto;margin:12px 0;line-height:1.5;color:var(--t2)}
code{font-family:var(--font-mono);font-size:.78rem}
table{width:100%;border-collapse:collapse;font-size:.8rem;margin:12px 0}
th,td{padding:6px 10px;border:1px solid var(--bd);text-align:left}
th{background:var(--sf2);font-weight:600}

/* Question card */
.q{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:calc(var(--sp)*2);margin-bottom:calc(var(--sp)*1);transition:border-color .25s}
.q.ok{border-color:var(--okbd)}.q.no{border-color:var(--erbd)}
.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:calc(var(--sp))}
.qn{font-family:var(--font-mono);font-size:.65rem;font-weight:600;color:var(--t4);letter-spacing:.08em;text-transform:uppercase}
.qt{font-family:var(--font-mono);font-size:.62rem;font-weight:500;color:var(--t4);padding:2px 8px;border-radius:4px;background:var(--sf2);border:1px solid var(--bd)}
.qtx{font-size:.88rem;color:var(--t);line-height:1.55;margin-bottom:calc(var(--sp)*1.5)}

/* Options */
.os{display:flex;flex-direction:column;gap:6px}
.op{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-size:.84rem;line-height:1.5;color:var(--t2);transition:all .12s;user-select:none}
.op:hover{border-color:var(--bdh);background:var(--sf3)}
.op.pk{border-color:var(--okbd);background:var(--okb)}
.op input{margin-top:3px;accent-color:var(--ok);pointer-events:none;flex-shrink:0}
.op .ck{margin-left:auto;font-size:.82rem;font-weight:700;min-width:1.2rem;text-align:center;flex-shrink:0}
.op.rt{border-color:var(--okbd);background:var(--okb);color:var(--ok)}
.op.wr{border-color:var(--erbd);background:var(--erb);color:var(--er)}

/* Fill blank */
.fi{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-family:var(--font-mono);font-size:.84rem;color:var(--t);width:180px;max-width:100%;outline:none;transition:border-color .15s;display:inline-block}
.fi:focus{border-color:var(--ok)}

/* Matching */
.mc{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.82rem}
.mi{padding:8px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--sf2)}
.mi strong{font-size:.72rem;font-weight:600;color:var(--t4)}
.ms{width:100%;padding:6px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--t);font-size:.82rem;margin-top:4px;font-family:var(--font-sans)}

/* Ordering */
.ol{display:flex;flex-direction:column;gap:5px}
.oi{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);font-size:.84rem;cursor:grab}
.oi .nm{width:22px;height:22px;border-radius:50%;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--t4);flex-shrink:0}
.oi.dg{opacity:.4}
.oi.dv{border-color:var(--ok);border-style:dashed}

/* Explanation */
.ex{margin-top:10px;padding:10px 12px;background:var(--sf2);border-radius:6px;font-size:.82rem;color:var(--t3);border-left:3px solid var(--ok);display:none;line-height:1.5}
.ex.show{display:block}

/* Bottom bar */
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);padding:10px;display:flex;justify-content:center;gap:12px;align-items:center;z-index:50}
.btn{font-family:var(--font-sans);padding:8px 20px;border-radius:var(--r);font-size:.86rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn1{background:var(--ok);color:#fff}.btn1:hover{opacity:.9}
.btn2{background:var(--sf2);color:var(--t);border:1px solid var(--bd)}.btn2:hover{border-color:var(--ok)}
.scr{font-size:.86rem;font-weight:600}
.sg{color:var(--ok)}.sb{color:var(--er)}
.hid{display:none}
@media(max-width:600px){body{padding:16px 16px 80px}.mc{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<div class="hdr">
<div class="hdr-left">
<h1>Practical Mock Exam</h1>
<div class="sub">MOD006125 Cloud Computing — 8 scenarios × 10 questions</div>
</div>
<div style="display:flex;gap:6px;align-items:center">
<button class="tbtn" onclick="tog()" id="tb" title="Toggle theme">🌙</button>
<a href="mock-exam.html" class="tbtn" title="Theory exam">📝</a>
</div>
</div>
<div class="stabs" id="sn"></div>
<div id="sc"></div>
</div>
<div class="bar">
<button class="btn btn2" onclick="rst()">Reset</button>
<div class="scr" id="sd"></div>
<button class="btn btn1" onclick="chk()">Check Answers</button>
</div>

<script>
const S=[
{id:'b',t:'S1: ByteBooks',d:'AWS Web Deployment (IAM, VPC, EC2, SGs)',co:'ByteBooks is a small online bookshop deploying their website to AWS. As junior cloud engineer, you set up IAM, VPC, security groups, EC2, and user data.',code:'IAM: Allow s3:Get/Put/ListBucket on bytebooks-website | Deny s3:DeleteBucket\nVPC: 10.0.0.0/16 | Public: 10.0.1.0/24 | Private: 10.0.2.0/24\nSG: HTTP:80 from 0.0.0.0/0 | SSH:22 from 10.0.0.0/16\nEC2: ami-0abcdef, t3.micro, key: bytebooks-key, user-data: install.sh\nUser Data: yum install httpd, aws s3 sync → /var/www/html',q:[
{tp:'ord',tx:'Order the deployment steps from first to last:',it:['Create VPC with CIDR 10.0.0.0/16','Create public subnet (10.0.1.0/24) and private subnet (10.0.2.0/24)','Attach Internet Gateway and configure public route table','Create security group sg-bytebooks (HTTP:80 + SSH:22)','Launch EC2 instance with user data script','Test website by browsing to public IP'],c:[0,1,2,3,4,5],ex:'VPC first, then subnets within AZs, then IGW + route table for internet access, then security group rules, then EC2 launch, finally test.'},
{tp:'mat',tx:'Match each EC2 launch parameter to its purpose:',lf:['--image-id ami-0abcdef1234567890','--instance-type t3.micro','--key-name bytebooks-key','--user-data file://install.sh'],rt:['SSH key pair for remote access','Bootstrap script executed at first launch','AMI template defining the OS and software','vCPU and memory resources'],c:{0:2,1:3,2:0,3:1},ex:'--image-id selects the AMI template, --instance-type defines resources, --key-name sets SSH credentials, --user-data provides the bootstrap script.'},
{tp:'fb',tx:'Complete the SSH command:<br><code>ssh -i <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u>.pem ec2-user@52.56.78.90</code>',c:['bytebooks-key'],ex:'The key pair name from the --key-name parameter: bytebooks-key.'},
{tp:'mul',tx:'Based on the sg-bytebooks security group rules, which inbound traffic is permitted? (Select ALL that apply)',op:['HTTP traffic from any IP address on port 80','HTTPS traffic from any IP address on port 443','SSH traffic from within the VPC (10.0.0.0/16) on port 22','SSH traffic from any IP address on port 22'],c:[0,2],ex:'SG allows HTTP from 0.0.0.0/0 (A) and SSH from 10.0.0.0/16 only (C). No HTTPS rule exists, and SSH is restricted to VPC only.'},
{tp:'tf',tx:'The User Data script (install.sh) will re-execute automatically every time the EC2 instance is rebooted.',op:['True','False'],c:1,ex:'User Data scripts run only on the first boot of an EC2 instance by default, not on every reboot.'},
{tp:'sng',tx:'A developer with the IAM policy runs: <code>aws s3 rb s3://bytebooks-website --force</code>. What is the outcome?',op:['The bucket is deleted successfully','The bucket contents are deleted but the bucket remains','The request is denied due to the explicit Deny on s3:DeleteBucket','The request is queued for admin approval'],c:2,ex:'Explicit Deny always overrides any Allow. The policy has an explicit Deny on s3:DeleteBucket, so the request is denied.'},
{tp:'ord',tx:'The website is not loading. Order the troubleshooting steps:',it:['Verify security group allows inbound HTTP on port 80','Check route table has a route to the Internet Gateway','Confirm the instance has a public IP address','SSH into instance: systemctl status httpd','Examine /var/log/cloud-init-output.log for errors'],c:[0,1,2,3,4],ex:'Network layer first (SG, routes, public IP), then application layer (httpd status), then logs for User Data errors.'},
{tp:'fb',tx:'The instance has private IP 10.0.1.42. Based on the VPC design, it is in the <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> subnet.',c:['public'],ex:'10.0.1.0/24 is the public subnet. 10.0.2.0/24 is private.'},
{tp:'fb2',tx:'Complete the AWS CLI command:<br><code>aws <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> --instance-ids i-0bb1234567example</code>',c:['ec2','describe-instances'],ex:'aws ec2 describe-instances describes EC2 instance details.'},
{tp:'mat',tx:'Match each characteristic to Security Group or Network ACL:',lf:['Stateful — return traffic automatically allowed','Operates at the subnet level','Operates at the instance level','Stateless — return traffic must be explicitly allowed'],rt:['Security Group','Network ACL'],c:{0:0,1:1,2:0,3:1},ex:'Security Groups: stateful, instance-level. Network ACLs: stateless, subnet-level.'}
]},

{id:'sec',t:'S2: Security',d:'AWS Cloud Security — IAM, Encryption, Compliance',co:'A fintech company hardening their AWS security posture. Based on Module 4.',code:'Shared Responsibility\nAWS (OF cloud): physical infra, hardware, hypervisor\nCustomer (IN cloud): data, IAM, OS patching (EC2), firewall, encryption\n\nIAM: default Deny, Least Privilege, Roles = temporary creds\nMFA on root = first step\nShield = DDoS, KMS = keys, CloudTrail = audit',q:[
{tp:'sng',tx:'In the Shared Responsibility Model, who is responsible for patching the guest OS on an EC2 instance?',op:['AWS','The customer','Both equally','Neither'],c:1,ex:'For EC2 (IaaS), the customer manages the guest OS. AWS manages the hypervisor and physical infrastructure.'},
{tp:'sng',tx:'What is the effect of an IAM policy if there is no explicit Allow?',op:['Allow by default','Implicit Deny','Error','Read-only access'],c:1,ex:'IAM follows default Deny. If not explicitly allowed, it is implicitly denied. Explicit Deny always wins.'},
{tp:'mul',tx:'Which are components of the CIA Triad? (Select ALL that apply)',op:['Confidentiality','Authentication','Integrity','Availability','Authorisation'],c:[0,2,3],ex:'CIA = Confidentiality, Integrity, Availability. Authentication and Authorisation are separate concepts.'},
{tp:'sng',tx:'Which IAM entity provides temporary credentials for an EC2 instance to access S3?',op:['IAM User','IAM Group','IAM Role','IAM Policy'],c:2,ex:'IAM Roles provide temporary security credentials via instance profiles — no long-term keys stored on the instance.'},
{tp:'sng',tx:'What is the FIRST step to secure a new AWS account?',op:['Launch an EC2 instance','Enable MFA on the root account','Create a VPC','Set up billing alerts'],c:1,ex:'MFA on root is the most critical first step to prevent unauthorised account access.'},
{tp:'tf',tx:'Service Control Policies (SCPs) in AWS Organizations can grant new permissions to member accounts.',op:['True','False'],c:1,ex:'SCPs only set permission boundaries (restrict), they never grant permissions.'},
{tp:'sng',tx:'Which service provides managed DDoS protection?',op:['AWS WAF','AWS Shield','Amazon GuardDuty','AWS Config'],c:1,ex:'AWS Shield provides DDoS protection. Standard is free, Advanced has enhanced protection + 24/7 DRT.'},
{tp:'mul',tx:'Which services protect data at rest? (Select ALL that apply)',op:['Amazon S3 server-side encryption','Amazon EBS encryption','TLS/SSL certificates','Amazon RDS encryption with KMS'],c:[0,1,3],ex:'S3 SSE, EBS encryption, and RDS encryption protect data at rest. TLS/SSL protects data in transit.'},
{tp:'sng',tx:'As you move from IaaS to SaaS in the Shared Responsibility Model:',op:['Customer responsibility increases','AWS responsibility decreases','Customer responsibility decreases','Responsibility stays the same'],c:2,ex:'More managed services = AWS takes on more responsibility. Customer responsibility decreases.'},
{tp:'fb',tx:'The AWS service that records all API calls for auditing "who did what, when, and where" is AWS <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u>.',c:['cloudtrail'],alt:['cloud trail'],ex:'CloudTrail records API calls across your AWS account for security analysis and compliance auditing.'}
]},

{id:'net',t:'S3: Networking',d:'VPC, Security Groups, NACLs, Route 53, CloudFront',co:'Configuring VPC networking, subnets, security groups vs NACLs, DNS, and CDN. Based on Module 5.',code:'VPC: logically isolated network (CIDR, e.g. 10.0.0.0/16)\nSubnets: public (route to IGW) or private (no IGW)\nIGW: internet access | NAT GW: outbound for private subnets\nSG: stateful, instance-level, allow-only\nNACL: stateless, subnet-level, allow + deny\nRoute 53: DNS + health checks + routing policies\nCloudFront: CDN caching at 400+ edge locations',q:[
{tp:'sng',tx:'What is the key difference between Security Groups and Network ACLs?',op:['Security Groups are stateless; NACLs are stateful','Security Groups are stateful; NACLs are stateless','Both are stateful','Both are stateless'],c:1,ex:'Security Groups are stateful (return auto-allowed). NACLs are stateless (return must be explicit). SG = instance level, NACL = subnet level.'},
{tp:'fb',tx:'CIDR notation 10.0.0.0/24 provides <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> IP addresses.',c:['256'],ex:'/24 = 24 bits fixed, 8 bits for hosts = 2^8 = 256 addresses (254 usable after AWS reserves 5).'},
{tp:'sng',tx:'Which VPC component allows instances in a private subnet to access the internet for updates?',op:['Internet Gateway','NAT Gateway','Security Group','Route 53'],c:1,ex:'NAT Gateway enables outbound internet access for private subnet instances while blocking inbound.'},
{tp:'sng',tx:'Which Route 53 routing policy sends traffic to the Region with the lowest network latency?',op:['Simple','Weighted','Latency-based','Failover'],c:2,ex:'Latency-based routing directs users to the AWS Region providing the lowest latency.'},
{tp:'mul',tx:'Which are features of Amazon CloudFront? (Select ALL that apply)',op:['Content caching at edge locations','Reduces latency for end users','Manages DNS records','Integrates with S3 and EC2 origins'],c:[0,1,3],ex:'CloudFront caches content at edge locations for low latency. DNS is Route 53, not CloudFront.'},
{tp:'tf',tx:'A Security Group can have both Allow and Deny rules.',op:['True','False'],c:1,ex:'Security Groups only support Allow rules (default deny all inbound). NACLs support both Allow and Deny.'},
{tp:'sng',tx:'An Elastic IP is best described as:',op:['A private DNS name','A static public IPv4 address that can be remapped','A load balancer endpoint','A VPN tunnel address'],c:1,ex:'Elastic IP is a static public IPv4 you can remap between instances, useful for failover.'},
{tp:'ord',tx:'Order the VPC components from most broad to most specific:',it:['VPC (CIDR block)','Availability Zone','Subnet (within AZ)','EC2 Instance'],c:[0,1,2,3],ex:'VPC spans all AZs in a Region. AZs contain subnets. Subnets contain instances.'},
{tp:'sng',tx:'Which VPC feature enables a private connection between two VPCs?',op:['NAT Gateway','Internet Gateway','VPC Peering','Direct Connect'],c:2,ex:'VPC Peering connects two VPCs privately. Traffic stays on the AWS network, no transitive peering.'},
{tp:'fb2',tx:'Security Groups operate at the <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> level, while NACLs operate at the <u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u> level.',c:['instance','subnet'],ex:'SGs = instance level. NACLs = subnet level.'}
]},

{id:'cmp',t:'S4: Compute',d:'EC2, Lambda, Containers, Elastic Beanstalk',co:'EC2 instance types/pricing, Lambda serverless, containers, and Elastic Beanstalk. Based on Module 6.',code:'EC2 Families: General (T3/M5), Compute (C5), Memory (R5/X1), Storage (I3), GPU (P3)\nPricing: On-Demand, Reserved (75% off), Spot (90% off, interruptible), Dedicated\nLambda: max 15min, pay per request + 100ms compute\nContainers: ECS (Docker), EKS (K8s), Fargate (serverless), ECR (registry)\nBeanstalk: PaaS — upload code, handles provisioning/LB/ASG/health',q:[
{tp:'sng',tx:'Which EC2 instance family is best for a memory-intensive in-memory database?',op:['General Purpose (T3)','Compute Optimised (C5)','Memory Optimised (R5)','Storage Optimised (I3)'],c:2,ex:'Memory Optimised (R5, X1) for in-memory databases, real-time analytics, large caches.'},
{tp:'sng',tx:'What is the maximum execution time for an AWS Lambda function?',op:['60 seconds','5 minutes','15 minutes','1 hour'],c:2,ex:'Lambda max timeout = 15 minutes (900 seconds). For longer workloads, use Step Functions or EC2.'},
{tp:'mul',tx:'Which are valid EC2 pricing models? (Select ALL that apply)',op:['On-Demand','Reserved Instances','Spot Instances','Monthly Subscription'],c:[0,1,2],ex:'On-Demand, Reserved (1/3-yr, up to 75% off), Spot (up to 90% off, interruptible), Dedicated Hosts. No subscription model.'},
{tp:'sng',tx:'Which service runs containers without managing any EC2 instances?',op:['Amazon ECS','Amazon EKS','AWS Fargate','Amazon ECR'],c:2,ex:'Fargate is serverless compute for containers — no EC2 management needed. ECS/EKS need underlying compute.'},
{tp:'sng',tx:'Elastic Beanstalk handles which tasks automatically? (Best answer)',op:['Only load balancing','Only auto scaling','Capacity provisioning, load balancing, auto scaling, and health monitoring','Only application deployment'],c:2,ex:'Beanstalk handles the full stack: provisioning, ELB, ASG, health monitoring. You just upload code.'},
{tp:'tf',tx:'EC2 Spot Instances can be interrupted by AWS with a 2-minute warning.',op:['True','False'],c:0,ex:'Spot Instances use spare capacity and can be reclaimed with 2-min notice when AWS needs capacity.'},
{tp:'fb',tx:'The maximum single PUT upload size for Amazon S3 is <u>&nbsp;&nbsp;&nbsp;&nbsp;</u> GB (use multipart for larger).',c:['5'],ex:'Max single PUT = 5 GB. Use multipart upload for objects larger than 5 GB (up to 5 TB).'},
{tp:'sng',tx:'An AMI (Amazon Machine Image) includes:',op:['Only the OS template','Only launch permissions','Only block device mappings','OS template, launch permissions, and block device mappings'],c:3,ex:'An AMI includes all three: root volume template, launch permissions, and block device mappings.'},
{tp:'sng',tx:'EC2 User Data scripts are used to:',op:['Create IAM users','Run a bootstrap script at instance launch','Encrypt storage volumes','Configure billing alerts'],c:1,ex:'User Data runs at first launch to automate software installation, configuration, and service startup.'},
{tp:'mat',tx:'Match each compute service to its best use case:',lf:['Amazon EC2','AWS Lambda','AWS Fargate','Elastic Beanstalk'],rt:['Event-driven serverless functions','Full control over VM configuration','Serverless containers','Quick PaaS deployment'],c:{0:1,1:0,2:2,3:3},ex:'EC2 = full VM control. Lambda = event-driven serverless. Fargate = serverless containers. Beanstalk = PaaS quick deploy.'}
]},

{id:'sto',t:'S5: Storage',d:'EBS, S3, EFS, Glacier',co:'Block (EBS), object (S3), file (EFS), and archival (Glacier) storage. Based on Module 7.',code:'EBS: block storage, single EC2, gp3/io2/st1/sc1 types\nS3: object storage, buckets, 11 nines durability, versioning, lifecycle\nEFS: shared POSIX file system, multiple EC2 instances\nGlacier: archival — Expedited(1-5min), Standard(3-5hr), Bulk(5-12hr), Deep(12-48hr)\nLifecycle: Standard → IA → Glacier (automated transitions)',q:[
{tp:'sng',tx:'How many nines of durability does Amazon S3 provide?',op:['99.9%','99.99%','99.999999999% (11 nines)','100%'],c:2,ex:'S3 = 11 nines durability. Store 10M objects → expect to lose one every 10,000 years.'},
{tp:'sng',tx:'Which storage service can be shared by multiple EC2 instances simultaneously?',op:['Amazon EBS','Amazon S3','Amazon EFS','Instance Store'],c:2,ex:'EFS is a shared POSIX file system mountable by hundreds of EC2 instances concurrently. EBS = single instance.'},

let ci=0,ans={};

function init(){
const n=document.getElementById('sn');
S.forEach((s,i)=>{
const b=document.createElement('button');
b.className='stab'+(i===0?' on':'');
b.textContent=s.t;
b.onclick=()=>sw(i);
n.appendChild(b);
});
ld(0);
if(localStorage.getItem('theme')==='dark'){
document.documentElement.setAttribute('data-theme','dark');
document.getElementById('tb').textContent='☀️';
}
}

function sw(i){
ci=i;
document.querySelectorAll('.stab').forEach((b,j)=>b.classList.toggle('on',j===i));
ld(i);
}

function ld(idx){
ans={};
document.getElementById('sd').textContent='';
const s=S[idx];
let h='<div class="sc"><h2>'+s.d+'</h2><div class="co">'+s.co+'</div>'+(s.code?'<pre>'+s.code+'</pre>':'')+'</div>';
s.q.forEach((q,i)=>{h+=rq(q,i)});
document.getElementById('sc').innerHTML=h;
idr();
}

function rq(q,i){
let h='<div class="q" id="q'+i+'"><div class="qh"><span class="qn">Q'+(i+1)+'</span><span class="qt">'+tl(q.tp)+'</span></div><div class="qtx">'+q.tx+'</div>';
if(q.tp==='sng'||q.tp==='tf'){
h+='<div class="os">';
q.op.forEach((o,j)=>{
h+='<label class="op" data-qi="'+i+'" data-oi="'+j+'" onclick="ps('+i+','+j+',this)"><input type="radio" name="q'+i+'"><span>'+o+'</span><span class="ck"></span></label>';
});
h+='</div>';
}else if(q.tp==='mul'){
h+='<div class="os">';
q.op.forEach((o,j)=>{
h+='<label class="op" data-qi="'+i+'" data-oi="'+j+'" onclick="pm('+i+','+j+',this)"><input type="checkbox"><span>'+o+'</span><span class="ck"></span></label>';
});
h+='</div>';
}else if(q.tp==='fb'){
h+='<div style="margin-top:8px"><input class="fi" id="fb'+i+'" placeholder="type answer..."></div>';
}else if(q.tp==='fb2'){
h+='<div style="margin-top:8px">';
q.c.forEach((_,j)=>{
h+='<input class="fi" id="fb'+i+'_'+j+'" placeholder="blank '+(j+1)+'..." style="width:150px;margin-right:8px">';
});
h+='</div>';
}else if(q.tp==='ord'){
const sh=[...Array(q.it.length).keys()].sort(()=>Math.random()-.5);
h+='<div class="ol" id="ol'+i+'">';
sh.forEach((orig,j)=>{
h+='<div class="oi" draggable="true" data-o="'+orig+'" data-p="'+i+'"><span class="nm">'+(j+1)+'</span><span>'+q.it[orig]+'</span></div>';
});
h+='</div>';
}else if(q.tp==='mat'){
h+='<div class="mc">';
q.lf.forEach((l,j)=>{
h+='<div class="mi"><strong>'+String.fromCharCode(65+j)+'.</strong> '+l+'<select class="ms" id="mt'+i+'_'+j+'"><option value="">select...</option>';
q.rt.forEach((r,k)=>{h+='<option value="'+k+'">'+r+'</option>'});
h+='</select></div>';
});
h+='</div>';
}
h+='<div class="ex" id="ex'+i+'">'+q.ex+'</div></div>';
return h;
}

function tl(t){
return{sng:'Multiple Choice',mul:'Multiple Answer',tf:'True / False',fb:'Fill in Blank',fb2:'Fill in Blanks',ord:'Ordering',mat:'Matching'}[t];
}

function ps(qi,oi,el){
document.querySelectorAll('[data-qi="'+qi+'"]').forEach(o=>{
o.classList.remove('pk');
o.querySelector('input').checked=false;
});
el.classList.add('pk');
el.querySelector('input').checked=true;
ans[qi]={s:oi};
}

function pm(qi,oi,el){
if(!ans[qi])ans[qi]={s:[]};
const inp=el.querySelector('input');
inp.checked=!inp.checked;
el.classList.toggle('pk',inp.checked);
if(inp.checked){ans[qi].s.push(oi)}
else{ans[qi].s=ans[qi].s.filter(x=>x!==oi)}
}

function idr(){
document.querySelectorAll('.ol').forEach(c=>{
c.addEventListener('dragstart',e=>{
const d=e.target.closest('.oi');
if(d){d.classList.add('dg');e.dataTransfer.setData('text/plain',d.dataset.o)}
});
c.addEventListener('dragend',e=>{
const d=e.target.closest('.oi');
if(d)d.classList.remove('dg');
c.querySelectorAll('.oi').forEach(x=>x.classList.remove('dv'));
});
c.addEventListener('dragover',e=>{
e.preventDefault();
const d=e.target.closest('.oi');
if(d)d.classList.add('dv');
});
c.addEventListener('dragleave',e=>{
const d=e.target.closest('.oi');
if(d)d.classList.remove('dv');
});
c.addEventListener('drop',e=>{
e.preventDefault();
const tgt=e.target.closest('.oi');
if(!tgt)return;
const orig=e.dataTransfer.getData('text/plain');
const dragged=c.querySelector('.oi[data-o="'+orig+'"]');
if(!dragged||dragged===tgt)return;
const items=[...c.children];
const di=items.indexOf(dragged);
const ti=items.indexOf(tgt);
if(di<ti)c.insertBefore(dragged,tgt.nextSibling);
else c.insertBefore(dragged,tgt);
rn(c);
c.querySelectorAll('.oi').forEach(x=>x.classList.remove('dv'));
});
});
}

function rn(c){c.querySelectorAll('.oi').forEach((x,i)=>{x.querySelector('.nm').textContent=i+1})}

function chk(){
const s=S[ci];
let correct=0,total=s.q.length;
s.q.forEach((q,i)=>{
const ex=document.getElementById('ex'+i);
ex.classList.add('show');
if(q.tp==='sng'||q.tp==='tf'){
const opts=document.querySelectorAll('[data-qi="'+i+'"]');
const sel=ans[i]?ans[i].s:undefined;
opts.forEach((o,j)=>{
o.classList.remove('pk');
const ck=o.querySelector('.ck');
if(j===q.c){o.classList.add('rt');ck.textContent='\u2713'}
else if(j===sel){o.classList.add('wr');ck.textContent='\u2717'}
else{ck.textContent=''}
});
if(sel!==undefined&&sel===q.c)correct++;
}else if(q.tp==='mul'){
const opts=document.querySelectorAll('[data-qi="'+i+'"]');
const sel=ans[i]?ans[i].s:[];
const ss=[...sel].sort(),sc=[...q.c].sort();
opts.forEach((o,j)=>{
o.classList.remove('pk');
const ck=o.querySelector('.ck');
if(q.c.includes(j)){o.classList.add('rt');ck.textContent='\u2713'}
else if(sel.includes(j)){o.classList.add('wr');ck.textContent='\u2717'}
else{ck.textContent=''}
});
if(JSON.stringify(ss)===JSON.stringify(sc)&&sel.length>0)correct++;
}else if(q.tp==='fb'){
const inp=document.getElementById('fb'+i);
const val=inp.value.trim().toLowerCase();
const cor=q.c[0].toLowerCase();
const alts=(q.alt||[]).map(a=>a.toLowerCase());
const isOk=val===cor||alts.includes(val);
inp.style.borderColor=isOk?'var(--ok)':'var(--er)';
if(isOk)correct++;
}else if(q.tp==='fb2'){
let all=true;
q.c.forEach((cor,j)=>{
const inp=document.getElementById('fb'+i+'_'+j);
const val=inp.value.trim().toLowerCase();
inp.style.borderColor=val===cor.toLowerCase()?'var(--ok)':'var(--er)';
if(val!==cor.toLowerCase())all=false;
});
if(all)correct++;
}else if(q.tp==='ord'){
const c=document.getElementById('ol'+i);
const items=[...c.querySelectorAll('.oi')];
const order=items.map(x=>parseInt(x.dataset.o));
const ok=order.every((v,j)=>v===q.c[j]);
items.forEach((x,j)=>{
const orig=parseInt(x.dataset.o);
x.style.borderColor=orig===q.c[j]?'var(--okbd)':'var(--erbd)';
});
if(ok)correct++;
}else if(q.tp==='mat'){
let allCorrect=true;
let allSelected=true;
q.lf.forEach((_,j)=>{
const sel=document.getElementById('mt'+i+'_'+j);
const val=sel.value;
if(val==='')allSelected=false;
const isOk=val!==''&&parseInt(val)===q.c[j];
sel.style.borderColor=isOk?'var(--ok)':(val!==''?'var(--er)':'var(--bd)');
if(!isOk)allCorrect=false;
});
if(allCorrect&&allSelected)correct++;
}
});
const pct=Math.round(correct/total*100);
const sd=document.getElementById('sd');
sd.textContent=correct+'/'+total+' ('+pct+'%)';
sd.className='scr '+(pct>=70?'sg':'sb');
}

function rst(){ld(ci)}

function tog(){
const d=document.documentElement;
const b=document.getElementById('tb');
if(d.getAttribute('data-theme')==='dark'){
d.removeAttribute('data-theme');
b.textContent='\u{1F319}';
localStorage.setItem('theme','light');
}else{
d.setAttribute('data-theme','dark');
b.textContent='\u2600\uFE0F';
localStorage.setItem('theme','dark');
}
}

init();
</script>
