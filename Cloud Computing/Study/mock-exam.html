<style>

.opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}

.fb.correct{color:var(--green)}
.fb.wrong{color:var(--red)}

</style>

ervice"], "a": 3}, {"t": "Which characteristic of cloud computing allows multiple users to share and access the same pool of computing resources?", "o": ["On-demand self-service", "Broad network access", "Resource pooling", "Rapid elasticity"], "a": 2}, {"t": "What does NIST stand for in the context of cloud computing definitions?", "o": ["National Internet Service Technology", "National Institute of Standards and Technology", "Network Infrastructure Standards Toolkit", "National Information Security Team"], "a": 1}, {"t": "What is the difference between scalability and elasticity?", "o": ["They are the same thing", "Scalability is scaling up (vertical), elasticity is scaling out (horizontal)", "Elasticity is manual, scalability is automatic", "Scalability refers to cost, elasticity refers to performance"], "a": 1}, {"t": "What does PUE measure in a data centre?", "o": ["Power Usage Effectiveness — ratio of total facility power to IT equipment power", "Processing Unit Efficiency — CPU performance metric", "Public Utility Expenditure — cloud cost metric", "Performance Under Extreme load"], "a": 0}, {"t": "Which cost model does cloud computing primarily follow?", "o": ["CapEx (Capital Expenditure)", "OpEx (Operational Expenditure)", "Fixed pricing", "Free tier only"], "a": 1}]}, {"week": "Week 2", "title": "Cloud Computing Models", "qs": [{"t": "What type of cloud infrastructure is accessible to the general public and owned by a third-party provider?", "o": ["Public Cloud", "Private Cloud", "Hybrid Cloud", "Community Cloud"], "a": 0}, {"t": "Which cloud deployment model provides exclusive use to a single organization?", "o": ["Public Cloud", "Private Cloud", "Hybrid Cloud", "Community Cloud"], "a": 1}, {"t": "Which cloud model combines the advantages of public and private clouds?", "o": ["Public Cloud", "Private Cloud", "Hybrid Cloud", "Community Cloud"], "a": 2}, {"t": "Which cloud model is shared among several organizations with similar concerns?", "o": ["Public Clo r transferring data between cloud servers", "A security mechanism for cloud environments"], "a": 1}, {"t": "Which type of virtualization allows multiple operating systems to run on a single physical machine simultaneously?", "o": ["Network virtualization", "Storage virtualization", "Server virtualization", "Desktop virtualization"], "a": 2}, {"t": "What is the purpose of live migration in cloud virtualization?", "o": ["Moving virtual machines between physical servers without downtime", "Upgrading the hypervisor software", "Scaling up cloud resources automatically", "Encrypting data during transmission"], "a": 0}, {"t": "Which virtualization technique provides a single interface to manage multiple storage devices?", "o": ["Network virtualization", "Storage virtualization", "Server virtualization", "Application virtualization"], "a": 1}, {"t": "Which of the following is a type of cloud deployment model that benefits from virtualization?", "o": ["Public cloud", "Private cloud", "Hybrid cloud", "All of the above"], "a": 3}, {"t": "What is the primary goal of network virtualization in cloud computing?", "o": ["Reducing latency", "Consolidating physical network equipment", "Simplifying network management", "Ensuring data confidentiality"], "a": 2}, {"t": "Which virtualization technique allows multiple VMs to share the same physical network interface?", "o": ["Server virtualization", "Network virtualization", "Storage virtualization", "Desktop virtualization"], "a": 1}, {"t": "Which virtualization technique abstracts physical storage resources and presents them as logical units?", "o": ["Server virtualization", "Network virtualization", "Storage virtualization", "Application virtualization"], "a": 2}, {"t": "Which virtualization technology allows users to access a remote desktop environment from anywhere?", "o": ["Server virtualization", "Network virtualization", "Storage virtualization", "Desktop virtualization"], "a": 3}, {"t": "Which cloud computing characteristic is closely associated with cloud virtualization?", "o": ["On-demand self-service", "Broad network access", "Resource pooling", "Rapid elasticity"], "a": 2}, {"t": "What is a Type 1 hypervisor?", "o": ["A hypervisor installed on top of a host operating system", "A hypervisor that runs directly on the physical hardware", "A hypervisor used for testing and development purposes", "A hypervisor designed for mobile devices"], "a": 1}, {"t": "What is the primary difference between Type 1 and Type 2 hypervisors?", "o": ["Type 1 are for servers, Type 2 are for desktops", "Type 1 run directly on hardware, Type 2 run on top of an operating system", "Type 1 are free, Type 2 are paid", "Type 1 support fewer VMs than Type 2"], "a": 1}, {"t": "Which type of hypervisor typically provides better performance and scalability?", "o": ["Type 1 hypervisor", "Type 2 hypervisor", "Both offer similar performance", "Depends on use case and configuration"], "a": 0}, {"t": "Which statement about the speed of Type 1 and Type 2 hypervisors is correct?", "o": ["Type 1 are generally slower than Type 2", "Type 2 are generally slower than Type 1", "Both offer similar speed", "Speed depends solely on underlying hardware"], "a": 1}, {"t": "What is the primary difference between full virtualization and para-virtualization?", "o": ["Full virtualization emulates hardware completely, para-virtualization modifies the guest OS", "Full virtualization does not require modifications to the guest OS, para-virtualization does", "Full virtualization only supports certain guest OS", "Full virtualization is slower due to increased overhead"], "a": 1}, {"t": "When would full virtualization be more suitable than para-virtualization?", "o": ["When the guest operating system cannot be modified", "When the main goal is to achieve high performance", "When the host system requires complete isolation", "When the guest OS is Linux-based"], "a": 0}, {"t": "Which of the following is an example of a Type 1 (bare-metal) hypervisor?" put Processing System", "Input/Output Performance Standard", "Input/Output Operations Per Second", "Internal Output Process System"], "a": 2}, {"t": "Which factor primarily affects IOPS performance in storage systems?", "o": ["Network bandwidth", "Disk space availability", "Processor speed", "Disk latency and response time"], "a": 3}, {"t": "If a storage system with a 10 ms average latency can handle 200 IOPS, what is its average response time?", "o": ["0.5 ms", "5 ms", "50 ms", "500 ms"], "a": 1}, {"t": "Object storage uses what structure to organise data?", "o": ["Folder hierarchy", "Volumes", "Buckets with flat structure and metadata", "Tables and rows"], "a": 2}, {"t": "Which type of storage is ephemeral (temporary) and lost if the compute resource is terminated?", "o": ["File storage", "Block storage", "Object storage", "Direct-attached storage"], "a": 3}, {"t": "Block storage connects to servers via what type of connection?", "o": ["Ethernet", "Optical fibre (Fibre Channel)", "USB", "Wi-Fi"], "a": 1}, {"t": "Which AWS service provides object storage?", "o": ["Amazon EBS", "Amazon EFS", "Amazon S3", "Amazon RDS"], "a": 2}]}, {"week": "Week 5", "title": "Cloud Databases", "qs": [{"t": "Which database type is also known as SQL databases?", "o": ["Relational databases", "Non-relational databases", "Graph databases", "Key-value stores"], "a": 0}, {"t": "Which database type is best suited for highly structured data with predefined schemas?", "o": ["Relational databases", "Non-relational databases", "Graph databases", "Columnar databases"], "a": 0}, {"t": "Which database type allows for flexible schemas and is ideal for semi-structured or unstructured data?", "o": ["Relational databases", "Non-relational databases", "Graph databases", "Document databases"], "a": 1}, {"t": "Which database type is often used for social networks, recommendation engines, and network analysis?", "o": ["Relational databases", "Non-relational databases", "Graph databases", "Key-value stores"], "a": 2}, {"t": "Which database type typically uses tables, rows, and columns to organize data?", "o": ["Relational databases", "Non-relational databases", "Graph databases", "Document databases"], "a": 0}, {"t": "What does CRUD stand for?", "o": ["Create, Read, Update, Delete", "Copy, Retrieve, Upload, Download", "Configure, Run, Update, Deploy", "Compute, Replicate, Upload, Distribute"], "a": 0}, {"t": "Which of the following is a non-relational (NoSQL) database service offered by AWS?", "o": ["Amazon RDS", "Amazon Aurora", "Amazon DynamoDB", "Amazon Redshift"], "a": 2}, {"t": "Why is data replication important in cloud databases?", "o": ["It reduces storage costs", "It improves fault tolerance and reduces latency", "It eliminates the need for backups", "It simplifies the database schema"], "a": 1}, {"t": "What does ACID compliance ensure in relational databases?", "o": ["High availability and scalability", "Atomicity, Consistency, Isolation, and Durability of transactions", "Automatic indexing and compression", "Access control and identity management"], "a": 1}, {"t": "Which type of NoSQL database stores data as JSON-like nested documents?", "o": ["Key-value store", "Column-family store", "Document data store", "Graph database"], "a": 2}]}, {"week": "Week 6", "title": "Cloud Security, Identity & Governance", "qs": [{"t": "Under the Shared Responsibility Model, which of the following is the customer's responsibility?", "o": ["Securing the physical data centres", "Patching the guest operating system", "Maintaining network hardware", "Decommissioning storage devices"], "a": 1}, {"t": "Which IAM entity is best suited for an EC2 instance that needs to access an S3 bucket?", "o": ["IAM User", "IAM Group", "IAM Role", "Root User"], "a": 2}, {"t": "What is the primary function of AWS CloudTrail?", "o": ["To block DDoS attacks", "To log API calls and user activity for auditing", "To encrypt data at rest", "To cache content at the edge"], "a": 1}, {"t": "Which principle states that users should be granted only the minimum permissions needed?", "o": ["Principle of Maximum Authority", "Principle of Least Privilege", "Principle of Shared Responsibility", "Principle of Elasticity"], "a": 1}, {"t": "Which service is used to centrally manage multiple AWS accounts and apply Service Control Policies?", "o": ["AWS IAM", "AWS Config", "AWS Organizations", "AWS Artifact"], "a": 2}, {"t": "In the context of the CIA triad, what does \"Integrity\" ensure?", "o": ["Data is not disclosed to unauthorised users", "Data is available when needed", "Data has not been altered or tampered with", "Data is encrypted at rest"], "a": 2}, {"t": "What does the \"C\" in the CIA triad stand for?", "o": ["Compliance", "Cloud", "Confidentiality", "Configuration"], "a": 2}, {"t": "Under the Shared Responsibility Model, who is responsible for the security *of* the cloud?", "o": ["The customer", "The cloud provider (AWS)", "Both equally", "Third-party auditors"], "a": 1}, {"t": "What is the difference between Security Groups and NACLs in AWS?", "o": ["Security Groups are stateless, NACLs are stateful", "Security Groups operate at the instance level (stateful), NACLs operate at the subnet level (stateless)", "They are identical", "NACLs only apply to outbound traffic"], "a": 1}, {"t": "What does AWS KMS provide?", "o": ["Kubernetes management", "Key Management Service for creating and controlling encryption keys", "Kinesis monitoring statistics", "Knowledge management system"], "a": 1}, {"t": "What type of firewall is a Security Group?", "o": ["Stateless", "Stateful", "Network-layer only", "Application-layer only"], "a": 1}, {"t": "AWS Shield protects against which type of attack?", "o": ["SQL injection", "Cross-site scripting", "DDoS attacks", "Social engineering"], "a": 2}]}, {"week": "Week 7", "title": "Migrating to the Cloud", "qs": [{"t": "What are the two broad approaches to cloud migration?", "o": ["Build and Deploy", "Lift-and-shift vs Re-architect", "Manual abling logging to improve performance", "Exposing administrative ports to the public internet"], "a": 0}, {"t": "How many pillars does the AWS Well-Architected Framework have?", "o": ["4", "5", "6", "7"], "a": 2, "e": "Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability"}, {"t": "What does \"mechanical sympathy\" mean in the context of the Performance Efficiency pillar?", "o": ["Being kind to servers", "Using a tool or system with an understanding of how it operates best", "Optimising for lowest cost only", "Automating all processes"], "a": 1}, {"t": "What is the anti-pattern for loosely coupled components?", "o": ["Using load balancers between layers", "Tightly coupling web servers directly to application servers", "Using message queues", "Using Amazon SQS"], "a": 1}, {"t": "What does \"treating resources as disposable\" mean?", "o": ["Never terminating instances", "Thinking of infrastructure as software — easily replaceable, stoppable, and recreatable", "Using only free-tier resources", "Ignoring cost optimisation"], "a": 1}, {"t": "What is caching used for in AWS architectures?", "o": ["Increasing storage capacity", "Minimising redundant data retrieval operations, improving performance and cost", "Encrypting data at rest", "Managing IAM roles"], "a": 1}]}, {"week": "Week 11", "title": "Module Revision", "qs": [{"t": "Match the correct service model to the description: \"You manage Data & App only, the provider manages everything else.\"", "o": ["IaaS", "PaaS", "SaaS", "FaaS"], "a": 1}, {"t": "Which NIST essential characteristic states that usage is monitored and billed?", "o": ["On-demand self-service", "Broad network access", "Resource pooling", "Measured service"], "a": 3}, {"t": "A Type 1 hypervisor runs directly on hardware. What is an example?", "o": ["VirtualBox", "VMware ESXi", "VMware Workstation", "Parallels Desktop"], "a": 1}, {"t": "Which storage type uses buckets, has a flat structure, and is accessed via API?", "o": ["Block storage", "File storage", "Object storage", "Direct-attached storage"], "a": 2}, {"t": "Amazon RDS is an example of which type of database service?", "o": ["Non-relational (NoSQL)", "Graph database", "Relational (SQL)", "Key-value store"], "a": 2}, {"t": "Under the Shared Responsibility Model, who is responsible for encrypting customer data?", "o": ["AWS", "The customer", "Both equally", "Neither"], "a": 1}, {"t": "Which migration strategy involves moving VMs to the cloud as-is?", "o": ["Refactor", "Rehost (lift and shift)", "Repurchase", "Retire"], "a": 1}, {"t": "What are containers best described as?", "o": ["Full virtual machines with their own OS", "Lightweight, portable packages that share the host OS kernel", "Physical servers", "Database instances"], "a": 1}, {"t": "In AWS networking, a VPC is best described as:", "o": ["A physical data centre", "An isolated virtual network in the cloud", "A type of storage", "A monitoring tool"], "a": 1}, {"t": "When justifying a design choice in an exam, you should reference at least how many pillars of the Well-Architected Framework?", "o": ["1", "2", "3", "All 6"], "a": 2, "e": "The revision slides state \"be able to justify design choices using at least three pillars\""}, {"t": "Which pillar focuses on minimising environmental impact?", "o": ["Cost Optimisation", "Sustainability", "Operational Excellence", "Performance Efficiency"], "a": 1}, {"t": "What does \"Refactor\" mean in the 6 Rs of migration?", "o": ["Lift and shift", "Re-architect for cloud-native (e.g., monolith to microservices)", "Buy a SaaS replacement", "Turn off unneeded services"], "a": 1}, {"t": "NACLs are ______ firewalls; Security Groups are ______ firewalls.", "o": ["Stateful; Stateless", "Stateless; Stateful", "Both stateless", "Both stateful"], "a": 1}, {"t": "A larger CIDR prefix number (e.g., /28 vs /16) means:", "o": ["More IP addresses", "Fewer IP addresses", "The same number of IPs", "Better security"], "a": 1}, {"t": "Which AWS service provides DDoS protection?", "o": ["AWS CloudTrail", "AWS Shield", "AWS KMS", "AWS Organizations"], "a": 1}]}];
let answered=0,correct=0,totalQs=0;
const state=[];
let mode='all',shuffleMap=null;

function init(){
  const nav=document.getElementById('nav');
  const container=document.getElementById('questions');
  let qi=0;
  DATA.forEach((sec,si)=>{
    const btn=document.createElement('button');
    btn.textContent=sec.week;
    btn.dataset.si=si;
    btn.onclick=()=>document.getElementById('w'+si).scrollIntoView({behavior:'smooth'});
    nav.appendChild(btn);

    const div=document.createElement('div');
    div.className='week-section';
    div.id='w'+si;
    const title=document.createElement('div');
    title.className='week-title';
    title.innerHTML=sec.week+' <small>· '+sec.title+'</small>';
    div.appendChild(title);

    sec.qs.forEach((q,qj)=>{
      const idx=qi++;
      state[idx]={sel:null,done:false,el:null};
      totalQs++;
      const qEl=document.createElement('div');
      qEl.className='q';
      qEl.id='q'+idx;
      qEl.innerHTML='<div class="q-num">Q'+(idx+1)+'</div><div class="q-text">'+esc(q.t)+'</div><div class="options">'+q.o.map((o,k)=>'<div class="opt" data-q="'+idx+'" data-o="'+k+'" onclick="sel('+idx+','+k+')"><span class="letter">'+'ABCD'[k]+'.</span><span>'+esc(o)+'</span></div>').join('')+'</div><button class="check-btn" id="c'+idx+'" onclick="chk('+idx+')" disabled>Check</button><div class="fb" id="fb'+idx+'"></div><div class="ex" id="ex'+idx+'">'+esc(q.e||'')+'</div>';
      state[idx].el=qEl;
      div.appendChild(qEl);
    });
    container.appendChild(div);
  });
  document.getElementById('total').textContent=totalQs;
  applyMode();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function getQ(idx){let i=idx;for(const s of DATA)for(const q of s.qs){if(i===0)return q;i--}return null}

function sel(qi,oi){if(state[qi].done)return;state[qi].sel=oi;document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(e=>e.classList.remove('selected'));document.querySelector('.opt[data-q="'+qi+'"][data-o="'+oi+'"]').classList.add('selected');document.getElementById('c'+qi).disabled=false}

function chk(qi){
  if(state[qi].done||state[qi].sel===null)return;
  state[qi].done=true;
  const q=getQ(qi),ok=q.a===state[qi].sel;
  answered++;if(ok)correct++;
  document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(e=>{const o=+e.dataset.o;if(o===q.a)e.classList.add('correct');if(o===state[qi].sel&&!ok)e.classList.add('wrong');e.style.cursor='default'});
  const fb=document.getElementById('fb'+qi);
  fb.textContent=ok?'✓ Correct':'✗ Incorrect';fb.className='fb show '+(ok?'correct':'wrong');
  const ex=document.getElementById('ex'+qi);if(q.e){ex.textContent=q.e;ex.classList.add('show')}
  document.getElementById('c'+qi).style.display='none';
  const qEl=document.getElementById('q'+qi);qEl.classList.add('answered',ok?'correct':'wrong');
  update();if(answered===totalQs)showScore();
}

function update(){
  document.getElementById('score').textContent=correct;
  document.getElementById('pct').textContent=answered?Math.round(correct/answered*100)+'%':'0%';
  document.getElementById('progress').style.width=(answered/totalQs*100)+'%';
}

function showScore(){
  const pct=Math.round(correct/totalQs*100);
  const cls=pct>=70?'great':pct>=50?'ok':'low';
  document.getElementById('scorecard').innerHTML='<h2>Exam Complete!</h2><div class="big '+cls+'">'+pct+'%</div><p style="color:var(--text3);margin-top:.5rem">'+correct+' / '+totalQs+' correct</p>';
  document.getElementById('scorecard').style.display='block';
}

function setMode(m){
  mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+(m==='all'?'all':m==='unanswered'?'unanswered':'wrong')).classList.add('active');
  applyMode();
}

function applyMode(){
  state.forEach((s,i)=>{
    const el=s.el;if(!el)return;
    if(mode==='all'){el.style.display='';}
    else if(mode==='unanswered'){el.style.display=s.done?'none':'';}
    else if(mode==='wrong'){el.style.display=(s.done&&s.sel!==getQ(i).a)?'':'none';}
  });
  // Update nav active states
  document.querySelectorAll('.nav button').forEach(b=>{
    const si=+b.dataset.si;
    const sec=DATA[si];
    let start=0;for(let j=0;j<si;j++)start+=DATA[j].qs.length;
    const vis=sec.qs.some((_,j)=>{const idx=start+j;const el=state[idx].el;return el&&el.style.display!==''});
    // simple: show all nav buttons
    b.style.display='';
  });
}

function shuffle(){
  const container=document.getElementById('questions');
  const allQs=Array.from(container.querySelectorAll('.q'));
  for(let i=allQs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));container.appendChild(allQs[j]);allQs.splice(j,1)}
  document.querySelectorAll('.week-section').forEach(s=>{s.style.display=s.querySelectorAll('.q').length?'':'none'});
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-shuffle').classList.add('active');
}

function resetAll(){
  state.forEach(s=>{s.sel=null;s.done=false;s.el.classList.remove('answered','correct','wrong')});
  answered=0;correct=0;
  document.querySelectorAll('.opt').forEach(e=>{e.className='opt';e.style.cursor='pointer'});
  document.querySelectorAll('.fb').forEach(e=>e.className='fb');
  document.querySelectorAll('.ex').forEach(e=>e.classList.remove('show'));
  document.querySelectorAll('.check-btn').forEach(e=>{e.style.display='';e.disabled=true});
  document.getElementById('scorecard').style.display='none';
  mode='all';document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-all').classList.add('active');
  // Restore section order
  const container=document.getElementById('questions');
  const secs=Array.from(container.querySelectorAll('.week-section'));
  secs.sort((a,b)=>+a.id.replace('w','')-+b.id.replace('w',''));
  secs.forEach(s=>{s.style.display='';container.appendChild(s)});
  applyMode();update();
}

function toggleTheme(){
  const isLight=document.documentElement.getAttribute('data-theme')==='light';
  document.documentElement.setAttribute('data-theme',isLight?'dark':'light');
  document.querySelector('.theme-toggle').textContent=isLight?'🌙':'☀️';
  localStorage.setItem('theme',isLight?'dark':'light');
}

// Restore theme
if(localStorage.getItem('theme')==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').textContent='☀️'}

init();
</script>
